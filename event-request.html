<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Ms. Fizzy's For Your Event</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="min-h-screen bg-white">

    <!-- Navigation -->
    <nav class="bg-red-600 text-white py-4 px-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="index.html">
                    <img src="logo.png" alt="Ms. Fizzy's Logo" class="h-12 object-contain">
                </a>
                <span class="hidden md:inline text-sm">Dirty Sodas</span>
            </div>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="index.html#home" class="hover:text-red-200 transition">Home</a>
                <a href="index.html#about" class="hover:text-red-200 transition">About</a>
                <a href="quiz.html" class="hover:text-red-200 transition">Quiz</a>
                <a href="index.html#menu" class="hover:text-red-200 transition">Menu</a>
                <a href="index.html#services" class="hover:text-red-200 transition">Services</a>
                <a href="index.html#contact" class="hover:text-red-200 transition">Contact</a>
                <a href="https://www.instagram.com/ms.fizzys" target="_blank" rel="noopener noreferrer" class="hover:text-red-200 transition" aria-label="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
            </div>

            <!-- Mobile Menu Button -->
            <button class="md:hidden" onclick="toggleMobileMenu()" id="mobile-menu-button">
                <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                <svg id="close-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden mt-4 space-y-4 pb-4">
            <a href="index.html#home" class="block hover:text-red-200 transition py-2">Home</a>
            <a href="index.html#about" class="block hover:text-red-200 transition py-2">About</a>
            <a href="quiz.html" class="block hover:text-red-200 transition py-2">Quiz</a>
            <a href="index.html#menu" class="block hover:text-red-200 transition py-2">Menu</a>
            <a href="index.html#services" class="block hover:text-red-200 transition py-2">Services</a>
            <a href="index.html#contact" class="block hover:text-red-200 transition py-2">Contact</a>
        </div>
    </nav>

    <!-- Header -->
    <div class="bg-pink-50 py-16 px-6 text-center">
        <h1 class="text-4xl md:text-5xl font-bold text-red-600 mb-4">Book Ms. Fizzy's For Your Event!</h1>
        <p class="text-xl text-gray-600 max-w-2xl mx-auto">Fill out the form below and we'll get back to you as soon as possible to confirm your booking!</p>
    </div>

    <!-- Form Section -->
    <section class="py-16 px-6">
        <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">

            <form action="https://formspree.io/f/mnjbkvap" method="POST">
                <form action="https://formspree.io/f/mnjbkvap" method="POST">

                <!-- Name -->
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Your Name *</label>
                    <input type="text" name="name" required
                        class="w-full border-2 border-gray-200 rounded-xl py-3 px-4 focus:border-red-400 focus:outline-none transition"
                        placeholder="Your full name">
                </div>

                <!-- Email -->
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Email Address *</label>
                    <input type="email" name="email" required
                        class="w-full border-2 border-gray-200 rounded-xl py-3 px-4 focus:border-red-400 focus:outline-none transition"
                        placeholder="your@email.com">
                </div>

                <!-- Phone -->
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Phone Number *</label>
                    <input type="tel" name="phone" required
                        class="w-full border-2 border-gray-200 rounded-xl py-3 px-4 focus:border-red-400 focus:outline-none transition"
                        placeholder="(555) 555-5555">
                </div>

                <!-- Event Type -->
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Type of Event *</label>
                    <select name="event_type" required
                        class="w-full border-2 border-gray-200 rounded-xl py-3 px-4 focus:border-red-400 focus:outline-none transition">
                        <option value="">Select event type...</option>
                        <option value="Birthday Party">Birthday Party</option>
                        <option value="Wedding">Wedding</option>
                        <option value="Baby Shower">Baby Shower</option>
                        <option value="Corporate Event">Corporate Event</option>
                        <option value="Fundraiser">Fundraiser</option>
                        <option value="School Event">School Event</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Event Date -->
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Event Date *</label>
                    <input type="date" name="event_date" required
                        class="w-full border-2 border-gray-200 rounded-xl py-3 px-4 focus:border-red-400 focus:outline-none transition">
                </div>

                <!-- Number of Guests -->
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Estimated Number of Guests *</label>
                    <select name="guests" required
                        class="w-full border-2 border-gray-200 rounded-xl py-3 px-4 focus:border-red-400 focus:outline-none transition">
                        <option value="">Select guest count...</option>
                        <option value="1-29">1 - 29</option>
                        <option value="29-50">29 - 50</option>
                        <option value="51-75">51 - 75</option>
                        <option value="76-100">76 - 100</option>
                        <option value="100+">100+</option>
                    </select>
                </div>

                <!-- Location -->
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Event Location / City *</label>
                    <input type="text" name="location" required
                        class="w-full border-2 border-gray-200 rounded-xl py-3 px-4 focus:border-red-400 focus:outline-none transition"
                        placeholder="City, CA">
                </div>

                <!-- Additional Notes -->
                <div class="mb-8">
                    <label class="block text-gray-700 font-semibold mb-2">Additional Notes</label>
                    <textarea name="message" rows="4"
                        class="w-full border-2 border-gray-200 rounded-xl py-3 px-4 focus:border-red-400 focus:outline-none transition"
                        placeholder="Tell us anything else about your event..."></textarea>
                </div>

                <!-- Submit Button -->
                <div class="text-center">
                    <button type="submit"
                        class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-12 rounded-full text-lg transition">
                        Submit Request 🥤
                    </button>
                </div>

            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-red-600 text-white py-8 px-6">
        <div class="max-w-6xl mx-auto text-center">
            <p>&copy; 2026 Ms. Fizzy's Dirty Sodas</p>
            <p class="mt-2 text-sm">Woman-owned • Marin County, CA</p>
        </div>
    </footer>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const menuIcon = document.getElementById('menu-icon');
            const closeIcon = document.getElementById('close-icon');
            menu.classList.toggle('hidden');
            menuIcon.classList.toggle('hidden');
            closeIcon.classList.toggle('hidden');
        }
    </script>

</body>
</html>
